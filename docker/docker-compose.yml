services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "8082:5000"
    volumes:
      - db_data:/var/lib/postgresql/data 
      - ../data/scripts.py:/docker-entrypoint-initdb.d/scripts.py

volumes:
  db_data: